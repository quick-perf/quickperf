name: 'Setup Maven Daemon'
description: 'Install and cache mvnd, using the JVM-based client'
inputs:
  version:
    description: 'mvnd version to install'
    required: true
outputs:
  mvnd_cmd:
    description: 'The mvnd JVM-based command (mvnd.sh on Linux/macOS, mvnd.cmd on Windows)'
    value: ${{ steps.platform.outputs.cmd }}
runs:
  using: composite
  steps:
    - name: Determine mvnd archive and command
      id: platform
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
        RUNNER_OS_NAME: ${{ runner.os }}
      run: |
        case "${RUNNER_OS_NAME}" in
          Linux)   echo "archive=maven-mvnd-${VERSION}-linux-amd64" >> $GITHUB_OUTPUT ;;
          macOS)   echo "archive=maven-mvnd-${VERSION}-darwin-aarch64" >> $GITHUB_OUTPUT ;;
          Windows) echo "archive=maven-mvnd-${VERSION}-windows-amd64" >> $GITHUB_OUTPUT ;;
          *)       echo "::error::Unsupported runner OS: ${RUNNER_OS_NAME}"; exit 1 ;;
        esac
        if [[ "${RUNNER_OS_NAME}" == "Windows" ]]; then
          echo "cmd=mvnd.cmd" >> $GITHUB_OUTPUT
        else
          echo "cmd=mvnd.sh" >> $GITHUB_OUTPUT
        fi

    - name: Cache mvnd archive
      id: cache-mvnd
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ${{ runner.temp }}/mvnd.zip
        key: mvnd-v2-${{ runner.os }}-${{ inputs.version }}

    - name: Download mvnd
      if: steps.cache-mvnd.outputs.cache-hit != 'true'
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
        ARCHIVE: ${{ steps.platform.outputs.archive }}
      run: |
        curl -fsL "https://downloads.apache.org/maven/mvnd/${VERSION}/${ARCHIVE}.zip" \
          -o "${RUNNER_TEMP}/mvnd.zip"

    - name: Verify and extract mvnd
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
        ARCHIVE: ${{ steps.platform.outputs.archive }}
      run: |
        curl -fsL "https://downloads.apache.org/maven/mvnd/${VERSION}/${ARCHIVE}.zip.sha512" \
          -o "${RUNNER_TEMP}/mvnd.zip.sha512"
        echo "$(cat "${RUNNER_TEMP}/mvnd.zip.sha512")  ${RUNNER_TEMP}/mvnd.zip" | sha512sum -c -

        # GPG signature verification
        curl -fsL "https://downloads.apache.org/maven/KEYS" | gpg --import --quiet
        curl -fsL "https://downloads.apache.org/maven/mvnd/${VERSION}/${ARCHIVE}.zip.asc" \
          -o "${RUNNER_TEMP}/mvnd.zip.asc"
        gpg --verify "${RUNNER_TEMP}/mvnd.zip.asc" "${RUNNER_TEMP}/mvnd.zip"

        unzip -q "${RUNNER_TEMP}/mvnd.zip" -d "${RUNNER_TEMP}/mvnd"

    - name: Add mvnd to PATH
      shell: bash
      env:
        ARCHIVE: ${{ steps.platform.outputs.archive }}
      run: echo "${RUNNER_TEMP}/mvnd/${ARCHIVE}/bin" >> $GITHUB_PATH

    - name: Smoke-test mvnd
      if: runner.os != 'Windows'
      shell: bash
      env:
        MVND_CMD: ${{ steps.platform.outputs.cmd }}
      run: $MVND_CMD --version

    - name: Smoke-test mvnd
      if: runner.os == 'Windows'
      shell: cmd
      env:
        MVND_CMD: ${{ steps.platform.outputs.cmd }}
      run: '"%MVND_CMD%" --version'
