name: CI

on: [push, pull_request]

env:
  MVND_VERSION: '1.0.5'

jobs:
  linux:
    runs-on: ubuntu-latest
    name: Java ${{ matrix.java }}
    strategy:
      matrix:
        java: [8, 11, 17]
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    - name: Set up JDK ${{ matrix.java }}
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
      with:
        java-version: ${{ matrix.java }}
        distribution: temurin
        cache: maven
    - name: Install mvnd
      uses: ./.github/actions/setup-mvnd
      with:
        version: ${{ env.MVND_VERSION }}
    - name: Build
      run: mvnd verify
    - name: Upload Maven Timeline
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: maven-timeline-linux-java-${{ matrix.java }}
        path: target/timeline/

  macOS:
    runs-on: macOS-latest
    name: Java ${{ matrix.java }}
    strategy:
      matrix:
        java: [11]
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    - name: Set up JDK ${{ matrix.java }}
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
      with:
        java-version: ${{ matrix.java }}
        distribution: temurin
        cache: maven
    - name: Install mvnd
      uses: ./.github/actions/setup-mvnd
      with:
        version: ${{ env.MVND_VERSION }}
    - name: Tests
      run: mvnd verify
    - name: Upload Maven Timeline
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: maven-timeline-macos-java-${{ matrix.java }}
        path: target/timeline/

  windows:
    runs-on: windows-latest
    name: Java ${{ matrix.java }}
    strategy:
      matrix:
        java: [11]
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    - name: Set up JDK ${{ matrix.java }}
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
      with:
        java-version: ${{ matrix.java }}
        distribution: temurin
        cache: maven
    - name: Install mvnd
      uses: ./.github/actions/setup-mvnd
      with:
        version: ${{ env.MVND_VERSION }}
    - name: Tests
      run: mvnd verify
    - name: Upload Maven Timeline
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: maven-timeline-windows-java-${{ matrix.java }}
        path: target/timeline/

  testcontainers:
    runs-on: ubuntu-latest
    name: Java ${{ matrix.java }}
    strategy:
      matrix:
        java: [11]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven
      - name: Install mvnd
        uses: ./.github/actions/setup-mvnd
        with:
          version: ${{ env.MVND_VERSION }}
      - name: Build
        run: mvnd install -DskipTests
      - name: Tests
        run: mvnd verify -P testcontainers -f ./sql/sql-testcontainers-test/pom.xml
      - name: Upload Maven Timeline
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: maven-timeline-testcontainers-java-${{ matrix.java }}
          path: sql/sql-testcontainers-test/target/timeline/

