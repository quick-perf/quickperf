name: CI

on: [push, pull_request]

jobs:
  linux:
    runs-on: ubuntu-latest
    name: Java ${{ matrix.java }}
    strategy:
      matrix:
        java: [8, 11, 17]
    env:
      REPO_SLUG: ${{ github.repository }}
      BRANCH: ${{ github.head_ref }}
    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK ${{ matrix.java }}
      uses: actions/setup-java@v5
      with:
        java-version: ${{ matrix.java }}
        distribution: temurin
        cache: maven
    - name: Build with Maven
      run: mvn verify
    - name: Upload Maven Timeline
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: maven-timeline-linux-java-${{ matrix.java }}
        path: target/timeline/

  macOS:
    runs-on: macOS-latest
    name: Java ${{ matrix.java }}
    strategy:
      matrix:
        java: [11]
    env:
      REPO_SLUG: ${{ github.repository }}
      BRANCH: ${{ github.head_ref }}
    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK ${{ matrix.java }}
      uses: actions/setup-java@v5
      with:
        java-version: ${{ matrix.java }}
        distribution: temurin
        cache: maven
    - name: Tests
      run: mvn verify
    - name: Upload Maven Timeline
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: maven-timeline-macos-java-${{ matrix.java }}
        path: target/timeline/

  windows:
    runs-on: windows-latest
    name: Java ${{ matrix.java }}
    strategy:
      matrix:
        java: [11]
    env:
      REPO_SLUG: ${{ github.repository }}
      BRANCH: ${{ github.head_ref }}
    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK ${{ matrix.java }}
      uses: actions/setup-java@v5
      with:
        java-version: ${{ matrix.java }}
        distribution: temurin
        cache: maven
    - name: Tests
      run: mvn verify
    - name: Upload Maven Timeline
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: maven-timeline-windows-java-${{ matrix.java }}
        path: target/timeline/

  testcontainers:
    runs-on: ubuntu-latest
    name: Java ${{ matrix.java }}
    strategy:
      matrix:
        java: [11]
    env:
      REPO_SLUG: ${{ github.repository }}
      BRANCH: ${{ github.head_ref }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven
      - name: Build
        run: mvn install -DskipTests
      - name: Tests
        run: mvn verify -P testcontainers -f ./sql/sql-testcontainers-test/pom.xml
      - name: Upload Maven Timeline
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: maven-timeline-testcontainers-java-${{ matrix.java }}
          path: sql/sql-testcontainers-test/target/timeline/

